; Configuration for Makefile commands
;
; Path:
;   .make/config.ini
;
; Note:
;   This file is used to configure the Makefile commands for the project.
;   It contains settings for the database, development environment, Django settings, and Python virtual environment.
;   Paths may be absolute or relative to the project root directory, and should be adjusted according to your local setup.
;   They should not be changed unless you know what you are doing and should not contain any trailing slashes.
;
; DO NOT EDIT THIS FILE!
; Overrides can be provided in a separate config-overrides.ini file, which will be loaded after this file and can override any of the settings defined here.
; Make sure to create a config-overrides.ini file in the same directory as this file if you want to override any settings.

[General]
appname = aa-bulletin-board
appname_verbose = AA Bulletin Board
package = aa_bulletin_board

[DB]
mysql_executable = /usr/bin/mysql
mysqldump_executable = /usr/bin/mysqldump
backup_directory = .
name = alliance_auth_development
host = localhost
port = 3306
user = allianceserver
password =

[Development]
base_dir = .
test_db_name = test_alliance_auth_development

[Django]
myauth_path = ../myauth
translation_directory = aa_bulletin_board/locale
translation_template = aa_bulletin_board/locale/django.pot
translation_file_relative_path = LC_MESSAGES/django.po

[Git]
git_repository = https://github.com/ppfeufer/aa-bulletin-board
git_repository_issues = https://github.com/ppfeufer/aa-bulletin-board/issues

[Python]
executable = ../venv/bin/python
venv_path = ../venv
